# ================================================================
# application-prod.properties — 本番環境（Render）専用の設定
#
# Render にデプロイすると、環境変数 SPRING_PROFILES_ACTIVE=prod が
# 自動でセットされるので、このファイルが読み込まれる。
#
# ★ 本番環境で気をつけること:
#   1. パスワードなど秘密情報をコードに書かない（環境変数で渡す）
#   2. ログを絞る（大量ログはコストやパフォーマンスに影響）
#   3. SQLの詳細ログは本番では不要（セキュリティリスクもある）
# ================================================================

# ----------------------------------------------------------------
# 本番では SQL ログを抑制する
# ----------------------------------------------------------------
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.type.descriptor.sql=warn

# ----------------------------------------------------------------
# Thymeleaf キャッシュ有効（本番はキャッシュしてパフォーマンス向上）
# ----------------------------------------------------------------
spring.thymeleaf.cache=true

# ----------------------------------------------------------------
# ★ PostgreSQL の SSL 設定
# Render の PostgreSQL は SSL 接続が必要
# sslmode=require → SSL を強制する
# ----------------------------------------------------------------
spring.datasource.url=${DATABASE_URL}
