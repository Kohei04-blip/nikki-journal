# ================================================================
# application.properties — 本番・共通設定
#
# ★ Spring Boot のプロファイル機能について
#
# このファイルは「全環境共通」の設定を書く場所。
# 環境ごとの差異は別ファイルに分離する:
#
#   application.properties          ← このファイル（共通 + 本番デフォルト）
#   application-local.properties    ← ローカル開発用（H2を使う）
#   application-prod.properties     ← 本番用（PostgreSQL を使う）
#
# 起動時に spring.profiles.active=local を指定すると
# application-local.properties が追加で読み込まれ、
# 同じキーがあれば上書きされる。
#
# 起動方法:
#   ローカル: mvn spring-boot:run -Dspring-boot.run.profiles=local
#   本番:     環境変数 SPRING_PROFILES_ACTIVE=prod を設定（Renderで自動）
# ================================================================

# ----------------------------------------------------------------
# ★ PostgreSQL 接続設定（本番環境）
#
# Render では DATABASE_URL という環境変数が自動でセットされる。
# ${DATABASE_URL} と書くと、その環境変数の値が使われる。
#
# ローカルでは application-local.properties の H2 設定が上書きするので
# ここの値は本番のみ使われる。
# ----------------------------------------------------------------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/nikkidb}
#
# ↑ ${変数名:デフォルト値} の書き方
#   DATABASE_URL 環境変数があればその値を使う
#   なければ jdbc:postgresql://localhost:5432/nikkidb を使う
#

spring.datasource.driver-class-name=org.postgresql.Driver

# Render の PostgreSQL は DATABASE_URL にユーザー名・パスワードが含まれるため
# 個別設定は不要だが、ローカルPostgreSQL用にデフォルト値を定義しておく
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# ----------------------------------------------------------------
# ★ JPA / Hibernate 設定
#
# ddl-auto の選択肢と意味:
#   create       → 起動時にテーブルを作り直す（データ消える）
#   create-drop  → 起動時に作成、終了時に削除（テスト用）
#   update       → 差分だけ変更（開発中によく使う）
#   validate     → テーブルとEntityが一致するか検証だけ（本番向き）
#   none         → 何もしない（本番で手動管理する場合）
#
# 本番では validate または none が安全。
# ここでは update にして、Entityの変更を自動反映できるようにしている。
# ----------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update

# PostgreSQL 用の方言（SQL の書き方）を指定
# Hibernate がDB種別に合わせた SQL を生成してくれる
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 発行される SQL をコンソールに表示（学習・デバッグに便利）
spring.jpa.show-sql=true

# SQL を読みやすく整形して表示
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------------------------------
# Thymeleaf 設定
# ----------------------------------------------------------------

# 本番ではキャッシュを有効にしてパフォーマンス向上
# ローカルでは application-local.properties で false に上書きする
spring.thymeleaf.cache=true

# ----------------------------------------------------------------
# サーバー設定
#
# Render は PORT 環境変数でポートを指定してくる。
# ${PORT:8080} → PORT環境変数があればその値、なければ8080
# ----------------------------------------------------------------
server.port=${PORT:8080}

# ----------------------------------------------------------------
# ログ設定
# ----------------------------------------------------------------
logging.level.org.hibernate.type.descriptor.sql=trace
logging.level.com.example.nikki=DEBUG
