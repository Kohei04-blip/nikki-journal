# ================================================================
# application-local.properties — ローカル開発専用の設定
#
# ★ Spring Boot のプロファイル上書きの仕組み
#
# このファイルは spring.profiles.active=local のときだけ読み込まれる。
# application.properties の設定を「上書き」する。
#
# 起動方法:
#   mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# または IntelliJ IDEA の場合:
#   Run Configurations → Active Profiles → "local" を入力
# ================================================================

# ----------------------------------------------------------------
# ★ H2 インメモリDB（ローカル開発用）
#
# PostgreSQL をローカルにインストールしなくても動かせる。
# ただし再起動するとデータが消えるので注意。
# ----------------------------------------------------------------

# application.properties の PostgreSQL 設定を H2 で上書き
spring.datasource.url=jdbc:h2:mem:nikkidb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 用の方言に変更（PostgreSQL 方言を上書き）
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ローカルでは毎回テーブルを作り直す（データ消える → デモデータが毎回入る）
spring.jpa.hibernate.ddl-auto=create-drop

# ----------------------------------------------------------------
# H2 コンソール（ブラウザでDBの中身を確認できる）
# http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:nikkidb
# ----------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----------------------------------------------------------------
# Thymeleaf キャッシュ無効（HTMLを変更してもリロードで反映）
# ----------------------------------------------------------------
spring.thymeleaf.cache=false
