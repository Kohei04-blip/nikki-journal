<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>過去の記録 — Nikki</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0A0A0A; --bg2:#111111; --card:#161616; --card2:#1C1C1C; --border:#282828;
  --gold:#C8A96E; --gold-dim:rgba(200,169,110,0.12);
  --text:#F5F0E8; --text-dim:#8A8070; --text-muted:#4A4540;
  --memo:#6E9FC8; --insight:#7EC87A; --worry:#C87A7A;
}
html { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:15px; line-height:1.6; }
body { min-height:100vh; display:flex; }
.sidebar { width:240px; flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:32px 0; position:sticky; top:0; height:100vh; }
.logo { font-family:'DM Serif Display',serif; font-size:20px; color:var(--gold); padding:0 24px 28px; border-bottom:1px solid var(--border); }
.logo small { display:block; font-size:10px; font-family:'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--text-dim); margin-top:2px; }
.nav { padding:16px 10px; }
.nav a { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:8px; font-size:14px; color:var(--text-dim); text-decoration:none; transition:all .15s; margin-bottom:2px; }
.nav a:hover { background:var(--card); color:var(--text); }
.nav a.active { background:var(--card2); color:var(--text); }
.main { flex:1; padding:48px; max-width:800px; }
.date-eyebrow { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
.page-title { font-family:'DM Serif Display',serif; font-size:40px; line-height:1.1; margin-bottom:36px; }
.page-title em { font-style:italic; color:var(--gold); }
.flash { background:var(--gold-dim); border:1px solid rgba(200,169,110,.3); border-radius:8px; padding:10px 16px; font-size:13px; color:var(--gold); margin-bottom:24px; }

/* 検索バー */
.search-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.search-bar input[type=text] { flex:1; min-width:160px; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:9px 14px; font-family:'Inter',sans-serif; font-size:13px; color:var(--text); outline:none; transition:border-color .2s; }
.search-bar input[type=text]:focus { border-color:rgba(200,169,110,.4); }
.search-bar input::placeholder { color:var(--text-muted); }
.search-bar select { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-family:'Inter',sans-serif; font-size:13px; color:var(--text-dim); outline:none; cursor:pointer; }
.search-bar select option { background:var(--card2); }
.search-bar button { background:var(--gold); color:var(--bg); border:none; border-radius:8px; padding:9px 18px; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }
.result-count { font-size:12px; color:var(--text-muted); margin-bottom:20px; }

/* エントリーカード */
.entry-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 22px; margin-bottom:10px; }
.entry-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.entry-date-link { font-size:12px; color:var(--text-dim); text-decoration:none; }
.entry-date-link:hover { color:var(--gold); }
.entry-preview { font-size:14px; color:var(--text-dim); line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; cursor:pointer; }
.entry-pills { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.pill { font-size:10px; padding:3px 9px; border-radius:50px; border:1px solid; letter-spacing:.06em; }
.pill-memo    { color:var(--memo);    border-color:rgba(110,159,200,.35); background:rgba(110,159,200,.1); }
.pill-insight { color:var(--insight); border-color:rgba(126,200,122,.35); background:rgba(126,200,122,.1); }
.pill-worry   { color:var(--worry);   border-color:rgba(200,122,122,.35); background:rgba(200,122,122,.1); }
.entry-actions { display:flex; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
.act-link { font-size:12px; color:var(--text-muted); text-decoration:none; padding:5px 12px; border:1px solid var(--border); border-radius:6px; transition:all .15s; }
.act-link:hover { color:var(--gold); border-color:var(--gold); }
.act-form { display:inline; }
.act-btn-danger { background:none; border:1px solid var(--border); color:var(--text-muted); font-size:12px; padding:5px 12px; border-radius:6px; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; }
.act-btn-danger:hover { color:var(--worry); border-color:var(--worry); }
@media (max-width:640px) { .sidebar { display:none; } .main { padding:24px 16px 60px; } }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">Nikki<small>Your Journal</small></div>
  <nav class="nav">
    <a th:href="@{/today}">✦ 今日</a>
    <a th:href="@{/history}" class="active">◈ 過去の記録</a>
    <a th:href="@{/reflect}">◎ 振り返り</a>
  </nav>
</aside>

<main class="main">
  <div class="date-eyebrow">すべての記録</div>
  <div class="page-title">記録<em>一覧</em></div>

  <div class="flash" th:if="${successMessage}" th:text="${successMessage}"></div>

  <!--
    ★ 検索フォーム (GET メソッド)
    GET を使う理由: 検索条件をURLに含めることで、結果ページをブックマークできる
    例: /history?keyword=カレー&mood=happy

    th:action="@{/history}" → /history に GET リクエストを送る
  -->
  <form th:action="@{/history}" method="get">
    <div class="search-bar">
      <!--
        ★ th:value="${keyword}" → フォームを送信しても検索語が入力欄に残る
        （ページ遷移後もユーザーの入力を保持するUX）
      -->
      <input type="text" name="keyword" th:value="${keyword}"
             placeholder="🔍 キーワードで検索…">

      <!--
        ★ <select> の選択状態を保持する
        th:selected="${mood == 'happy'}" → 現在のフィルターと一致するoptionを選択状態にする
      -->
      <select name="mood">
        <option value="" th:selected="${mood == null or mood == ''}">すべての気分</option>
        <option value="happy"   th:selected="${mood == 'happy'}">😊 良い</option>
        <option value="neutral" th:selected="${mood == 'neutral'}">😐 普通</option>
        <option value="sad"     th:selected="${mood == 'sad'}">😔 辛い</option>
        <option value="angry"   th:selected="${mood == 'angry'}">😤 もやもや</option>
        <option value="tired"   th:selected="${mood == 'tired'}">😴 疲れた</option>
      </select>

      <!--
        ★ 年月フィルター
        th:each でController から渡された yearMonths リストをループ
        YearMonth オブジェクトのメソッドを Thymeleaf から呼ぶ
      -->
      <select name="year">
        <option value="" th:selected="${year == null}">すべての年</option>
        <option th:each="ym : ${yearMonths}"
                th:value="${ym.year}"
                th:text="${ym.year} + '年'"
                th:selected="${year == ym.year}">年</option>
      </select>

      <select name="month">
        <option value="" th:selected="${month == null}">すべての月</option>
        <option th:each="ym : ${yearMonths}"
                th:value="${ym.monthValue}"
                th:text="${ym.monthValue} + '月'"
                th:selected="${month == ym.monthValue}">月</option>
      </select>

      <button type="submit">検索</button>
    </div>
  </form>

  <!--
    ★ th:text="${totalCount} + '件'" → 件数を表示
    数値と文字列を + で連結できる
  -->
  <div class="result-count" th:text="${totalCount} + '件'">0件</div>

  <!--
    ★ th:each でエントリー一覧をループ表示
    entryStat → ループの状態情報（index, count, first, last などが使える）
  -->
  <div th:each="e, entryStat : ${entries}">
    <div class="entry-card">
      <div class="entry-meta">
        <!--
          ★ th:href でIDをURLに埋め込む
          @{/entry/{id}(id=${e.id})} → /entry/1, /entry/2, ...
        -->
        <a class="entry-date-link" th:href="@{/entry/{id}(id=${e.id})}"
           th:text="${#temporals.format(e.date, 'yyyy年M月d日')} + '（' + ${#temporals.format(e.date, 'E', #locale)} + '）'">
          日付
        </a>
        <span th:text="${e.moodEmoji}"></span>
      </div>

      <div class="entry-preview"
           onclick="location.href='[(${'/entry/' + e.id})]'"
           th:text="${e.body} ?: (${e.memo} ?: (${e.insight} ?: ${e.worry}))">
      </div>

      <!-- コンテンツの種類をピルで表示 -->
      <div class="entry-pills">
        <!-- th:if → 値がある場合だけピルを表示 -->
        <span class="pill pill-memo"    th:if="${e.memo    != null and !#strings.isEmpty(e.memo)}">メモ</span>
        <span class="pill pill-insight" th:if="${e.insight != null and !#strings.isEmpty(e.insight)}">気づき</span>
        <span class="pill pill-worry"   th:if="${e.worry   != null and !#strings.isEmpty(e.worry)}">悩み</span>
      </div>

      <!-- アクションボタン -->
      <div class="entry-actions">
        <a class="act-link" th:href="@{/entry/{id}/edit(id=${e.id})}">✏️ 編集</a>

        <!--
          ★ 削除はPOSTで行う（GETリンクで削除すると意図せず削除される危険がある）
          JavaScriptの confirm() で確認ダイアログを表示する
          onsubmit="return confirm(...)" → キャンセルなら送信しない
        -->
        <form class="act-form"
              th:action="@{/entry/{id}/delete(id=${e.id})}"
              method="post"
              onsubmit="return confirm('この記録を削除しますか？')">
          <button class="act-btn-danger" type="submit">🗑 削除</button>
        </form>
      </div>
    </div>
  </div>

  <!-- 結果が0件のとき -->
  <p th:if="${#lists.isEmpty(entries)}"
     style="color:var(--text-muted);font-size:14px;margin-top:8px;">
    該当する記録がありません。
  </p>

</main>
</body>
</html>
