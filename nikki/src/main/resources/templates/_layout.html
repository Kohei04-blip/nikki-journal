<!DOCTYPE html>
<!--
  ★ Thymeleaf のテンプレート
  xmlns:th="..." → th: 属性（Thymeleaf専用の属性）を使うための宣言
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  ★ th:text → タグの中身をJavaの値で置き換える
  ${pageTitle} → Controller で model.addAttribute("pageTitle", "...") した値
  ?: → エルビス演算子。値がnullなら右辺を使う
-->
<title th:text="${pageTitle} ?: 'Nikki — ジャーナル'">Nikki</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0A0A0A; --bg2:#111111; --card:#161616; --card2:#1C1C1C; --border:#282828;
  --gold:#C8A96E; --gold-dim:rgba(200,169,110,0.12);
  --text:#F5F0E8; --text-dim:#8A8070; --text-muted:#4A4540;
  --memo:#6E9FC8; --insight:#7EC87A; --worry:#C87A7A;
}
html { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:15px; line-height:1.6; }
body { min-height:100vh; display:flex; }

/* SIDEBAR */
.sidebar { width:240px; flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:32px 0; position:sticky; top:0; height:100vh; }
.logo { font-family:'DM Serif Display',serif; font-size:20px; color:var(--gold); padding:0 24px 28px; border-bottom:1px solid var(--border); letter-spacing:.04em; }
.logo small { display:block; font-size:10px; font-family:'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--text-dim); margin-top:2px; }
.streak-box { margin:20px 16px; background:var(--gold-dim); border:1px solid rgba(200,169,110,.3); border-radius:12px; padding:16px; text-align:center; }
.streak-num { font-family:'DM Serif Display',serif; font-size:44px; color:var(--gold); line-height:1; }
.streak-lbl { font-size:10px; color:var(--text-dim); letter-spacing:.15em; text-transform:uppercase; margin-top:3px; }
.nav { padding:8px 10px; flex:1; }
.nav a { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:8px; font-size:14px; color:var(--text-dim); text-decoration:none; transition:all .15s; margin-bottom:2px; }
.nav a:hover { background:var(--card); color:var(--text); }
.nav a.active { background:var(--card2); color:var(--text); }

/* MAIN */
.main { flex:1; padding:48px; max-width:800px; }
.date-eyebrow { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
.page-title { font-family:'DM Serif Display',serif; font-size:40px; line-height:1.1; margin-bottom:36px; }
.page-title em { font-style:italic; color:var(--gold); }

/* FLASH MESSAGE */
.flash { background:var(--gold-dim); border:1px solid rgba(200,169,110,.3); border-radius:8px; padding:10px 16px; font-size:13px; color:var(--gold); margin-bottom:24px; }

/* FORM ELEMENTS */
.field-group { margin-bottom:20px; }
.field-label { font-size:10px; letter-spacing:.18em; text-transform:uppercase; font-weight:600; margin-bottom:8px; display:block; }
.field-label.lbl-diary   { color:var(--gold); }
.field-label.lbl-memo    { color:var(--memo); }
.field-label.lbl-insight { color:var(--insight); }
.field-label.lbl-worry   { color:var(--worry); }
.field-label.lbl-default { color:var(--text-muted); }
textarea, input[type=text] { width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 18px; font-family:'Inter',sans-serif; font-size:14px; color:var(--text); line-height:1.8; resize:none; outline:none; transition:border-color .2s; }
textarea:focus, input[type=text]:focus { border-color:rgba(200,169,110,.4); }
textarea::placeholder, input::placeholder { color:var(--text-muted); }

/* MOOD BUTTONS */
.mood-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:4px; }
.mood-radio { display:none; }
.mood-label { background:var(--card); border:1px solid var(--border); border-radius:50px; padding:7px 14px; font-size:13px; cursor:pointer; color:var(--text-dim); transition:all .15s; }
.mood-label:hover { border-color:var(--gold); color:var(--text); }
.mood-radio:checked + .mood-label { background:var(--gold-dim); border-color:var(--gold); color:var(--text); }

/* SAVE / ACTION BUTTONS */
.btn-primary { background:var(--gold); color:var(--bg); border:none; border-radius:8px; padding:11px 26px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-block; transition:opacity .15s; }
.btn-primary:hover { opacity:.88; }
.btn-secondary { background:transparent; border:1px solid var(--border); color:var(--text-dim); border-radius:8px; padding:10px 20px; font-family:'Inter',sans-serif; font-size:13px; cursor:pointer; text-decoration:none; display:inline-block; transition:all .15s; }
.btn-secondary:hover { border-color:var(--gold); color:var(--gold); }
.btn-danger { background:transparent; border:1px solid var(--border); color:var(--text-muted); border-radius:8px; padding:10px 20px; font-family:'Inter',sans-serif; font-size:13px; cursor:pointer; text-decoration:none; display:inline-block; transition:all .15s; }
.btn-danger:hover { border-color:var(--worry); color:var(--worry); }
.btn-row { display:flex; gap:10px; align-items:center; margin-top:8px; }

/* ENTRY CARDS */
.entry-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 22px; margin-bottom:10px; transition:background .15s; }
.entry-card:hover { background:var(--card2); }
.entry-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.entry-date-text { font-size:12px; color:var(--text-dim); }
.entry-preview { font-size:14px; color:var(--text-dim); line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.entry-pills { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.pill { font-size:10px; padding:3px 9px; border-radius:50px; border:1px solid; letter-spacing:.06em; }
.pill-memo    { color:var(--memo);    border-color:rgba(110,159,200,.35); background:rgba(110,159,200,.1); }
.pill-insight { color:var(--insight); border-color:rgba(126,200,122,.35); background:rgba(126,200,122,.1); }
.pill-worry   { color:var(--worry);   border-color:rgba(200,122,122,.35); background:rgba(200,122,122,.1); }
.entry-actions { display:flex; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
.act-link { font-size:12px; color:var(--text-muted); text-decoration:none; padding:5px 12px; border:1px solid var(--border); border-radius:6px; transition:all .15s; }
.act-link:hover { color:var(--gold); border-color:var(--gold); }
.act-link.danger:hover { color:var(--worry); border-color:var(--worry); }

/* SECTION DIVIDER */
hr.divider { border:none; border-top:1px solid var(--border); margin:32px 0; }
.section-title { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-muted); margin-bottom:16px; }

/* SEARCH BAR */
.search-bar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
.search-bar input, .search-bar select { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:9px 14px; font-family:'Inter',sans-serif; font-size:13px; color:var(--text); outline:none; }
.search-bar input { flex:1; min-width:140px; }
.search-bar select option { background:var(--card); }
.result-count { font-size:12px; color:var(--text-muted); }

@media (max-width:640px) { .sidebar { display:none; } .main { padding:24px 16px 60px; } }
</style>
</head>
<body>

<!--
  ★ Thymeleaf フラグメント（共通パーツ）の概念
  実際の実装では th:fragment / th:replace を使って共通レイアウトを作る。
  今回は各ページに共通部分を含める形（シンプルさ優先）。
-->

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">Nikki<small>Your Journal</small></div>

  <div class="streak-box">
    <!--
      ★ th:text="${streak}" → Javaの変数をHTMLに埋め込む
      Controller で model.addAttribute("streak", 7) なら「7」と表示される
    -->
    <div class="streak-num" th:text="${streak ?: 0}">0</div>
    <div class="streak-lbl">日連続</div>
  </div>

  <nav class="nav">
    <!--
      ★ th:href="@{/today}" → Thymeleafのリンク記法
      @{} を使うとコンテキストパスが自動付与される（サブディレクトリ配置でも壊れない）
    -->
    <!--
      ★ th:classappend → 既存のクラスに追加する
      ${activePage == 'today'} が true なら 'active' クラスが追加される
    -->
    <a th:href="@{/today}" th:classappend="${activePage == 'today'} ? 'active' : ''">✦ 今日</a>
    <a th:href="@{/history}" th:classappend="${activePage == 'history'} ? 'active' : ''">◈ 過去の記録</a>
    <a th:href="@{/reflect}" th:classappend="${activePage == 'reflect'} ? 'active' : ''">◎ 振り返り</a>
  </nav>
</aside>

<!-- MAIN CONTENT（各ページがここを上書きする） -->
<main class="main">
  <!--
    このファイルは単体では表示しない。
    各テンプレートファイル（today.html 等）で直接ヘッダーとサイドバーを含める。
  -->
</main>
</body>
</html>
