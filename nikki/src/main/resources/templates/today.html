<!DOCTYPE html>
<!--
  ★ 今日の記録ページ
  Controller の today() メソッドが return "today" したとき、このファイルが表示される。
  Spring Boot は src/main/resources/templates/today.html を自動で探す。
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の記録 — Nikki</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- ★ th:replace → 別ファイルのフラグメントを埋め込む（今回はスタイルのみ共通化） -->
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0A0A0A; --bg2:#111111; --card:#161616; --card2:#1C1C1C; --border:#282828;
  --gold:#C8A96E; --gold-dim:rgba(200,169,110,0.12);
  --text:#F5F0E8; --text-dim:#8A8070; --text-muted:#4A4540;
  --memo:#6E9FC8; --insight:#7EC87A; --worry:#C87A7A;
}
html { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:15px; line-height:1.6; }
body { min-height:100vh; display:flex; }
.sidebar { width:240px; flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:32px 0; position:sticky; top:0; height:100vh; }
.logo { font-family:'DM Serif Display',serif; font-size:20px; color:var(--gold); padding:0 24px 28px; border-bottom:1px solid var(--border); }
.logo small { display:block; font-size:10px; font-family:'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--text-dim); margin-top:2px; }
.streak-box { margin:20px 16px; background:var(--gold-dim); border:1px solid rgba(200,169,110,.3); border-radius:12px; padding:16px; text-align:center; }
.streak-num { font-family:'DM Serif Display',serif; font-size:44px; color:var(--gold); line-height:1; }
.streak-lbl { font-size:10px; color:var(--text-dim); letter-spacing:.15em; text-transform:uppercase; margin-top:3px; }
.streak-sub { font-size:11px; color:var(--text-muted); margin-top:6px; }
.nav { padding:8px 10px; }
.nav a { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:8px; font-size:14px; color:var(--text-dim); text-decoration:none; transition:all .15s; margin-bottom:2px; }
.nav a:hover { background:var(--card); color:var(--text); }
.nav a.active { background:var(--card2); color:var(--text); }
.main { flex:1; padding:48px; max-width:800px; }
.date-eyebrow { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
.page-title { font-family:'DM Serif Display',serif; font-size:40px; line-height:1.1; margin-bottom:36px; }
.page-title em { font-style:italic; color:var(--gold); }
.flash { background:var(--gold-dim); border:1px solid rgba(200,169,110,.3); border-radius:8px; padding:10px 16px; font-size:13px; color:var(--gold); margin-bottom:24px; }
.field-group { margin-bottom:20px; }
.field-label { font-size:10px; letter-spacing:.18em; text-transform:uppercase; font-weight:600; margin-bottom:8px; display:block; color:var(--text-muted); }
.field-label.gold { color:var(--gold); }
.field-label.memo { color:var(--memo); }
.field-label.insight { color:var(--insight); }
.field-label.worry { color:var(--worry); }
textarea { width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 18px; font-family:'Inter',sans-serif; font-size:14px; color:var(--text); line-height:1.8; resize:none; outline:none; transition:border-color .2s; }
textarea:focus { border-color:rgba(200,169,110,.4); }
textarea::placeholder { color:var(--text-muted); }
.mood-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:4px; }
.mood-radio { display:none; }
.mood-label { background:var(--card); border:1px solid var(--border); border-radius:50px; padding:7px 14px; font-size:13px; cursor:pointer; color:var(--text-dim); transition:all .15s; display:inline-block; }
.mood-label:hover { border-color:var(--gold); color:var(--text); }
.mood-radio:checked + .mood-label { background:var(--gold-dim); border-color:var(--gold); color:var(--text); }
.btn-primary { background:var(--gold); color:var(--bg); border:none; border-radius:8px; padding:11px 26px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:opacity .15s; }
.btn-primary:hover { opacity:.88; }
hr.divider { border:none; border-top:1px solid var(--border); margin:32px 0; }
.section-title { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-muted); margin-bottom:16px; }
.entry-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 22px; margin-bottom:10px; text-decoration:none; display:block; transition:background .15s; }
.entry-card:hover { background:var(--card2); }
.entry-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.entry-date-text { font-size:12px; color:var(--text-dim); }
.entry-preview { font-size:14px; color:var(--text-dim); line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
@media (max-width:640px) { .sidebar { display:none; } .main { padding:24px 16px 60px; } }
</style>
</head>
<body>

<!-- サイドバー -->
<aside class="sidebar">
  <div class="logo">Nikki<small>Your Journal</small></div>
  <div class="streak-box">
    <!--
      ★ th:text="${streak}" — Controller から渡された streak 変数を表示
      デフォルト値の書き方: th:text="${streak} ?: '0'"
    -->
    <div class="streak-num" th:text="${streak}">0</div>
    <div class="streak-lbl">日連続</div>
    <div class="streak-sub" th:text="${streak == 0} ? '今日を記録しよう' : (${streak == 1} ? '今日から始まりました！' : ${streak} + '日間、続いています')">
      今日を記録しよう
    </div>
  </div>
  <nav class="nav">
    <a th:href="@{/today}" class="active">✦ 今日</a>
    <a th:href="@{/history}">◈ 過去の記録</a>
    <a th:href="@{/reflect}">◎ 振り返り</a>
  </nav>
</aside>

<!-- メインコンテンツ -->
<main class="main">

  <!-- ページヘッダー -->
  <div class="date-eyebrow" th:text="${#temporals.format(today, 'EEEE', #locale) + '曜日'}">今日</div>
  <div class="page-title">
    <!--
      ★ #temporals — Thymeleaf の日付フォーマット用ユーティリティ
      #temporals.format(日付, パターン) で日付を好きな形式に変換できる
    -->
    <span th:text="${#temporals.format(today, 'yyyy年')}">2026年</span><em
    th:text="${#temporals.format(today, 'M月d日')}">6月18日</em>
  </div>

  <!--
    ★ th:if="${successMessage}" — successMessage が null でない場合だけ表示
    フラッシュ属性（RedirectAttributes）で渡されたメッセージを表示する
  -->
  <div class="flash" th:if="${successMessage}" th:text="${successMessage}"></div>

  <!--
    ★ <form> タグ
    th:action="@{/today}" → POSTの送信先URL
    th:object="${entry}"  → フォーム全体を entry オブジェクトに紐付ける
    method="post"         → HTTP POST で送信
  -->
  <form th:action="@{/today}" th:object="${entry}" method="post">

    <!--
      ★ th:field="*{date}" の意味:
      *{} は th:object で指定したオブジェクトのフィールドを参照する省略記法。
      th:field は id, name, value を自動でセットしてくれる。
      type="hidden" → ユーザーには見えないが、フォームと一緒に送信される
    -->
    <input type="hidden" th:field="*{date}">
    <!--
      th:if="${entry.id != null}" → 編集時だけIDを送る（新規登録時は不要）
    -->
    <input type="hidden" th:field="*{id}" th:if="${entry.id != null}">

    <!-- 気分 -->
    <div class="field-group">
      <span class="field-label">今日の気分</span>
      <div class="mood-row">
        <!--
          ★ ラジオボタンをCSSでカスタムスタイルにする方法
          <input> を非表示にして、隣の <label> にスタイルを当てる。
          label の for と input の id を一致させることでクリックが連動する。

          th:checked="${entry.mood == 'happy'}" → 既存の値と一致していればチェック済みにする
        -->
        <input class="mood-radio" type="radio" id="mood-happy" name="mood" value="happy"
               th:checked="${entry.mood == 'happy'}">
        <label class="mood-label" for="mood-happy">😊 良い</label>

        <input class="mood-radio" type="radio" id="mood-neutral" name="mood" value="neutral"
               th:checked="${entry.mood == 'neutral'}">
        <label class="mood-label" for="mood-neutral">😐 普通</label>

        <input class="mood-radio" type="radio" id="mood-sad" name="mood" value="sad"
               th:checked="${entry.mood == 'sad'}">
        <label class="mood-label" for="mood-sad">😔 辛い</label>

        <input class="mood-radio" type="radio" id="mood-angry" name="mood" value="angry"
               th:checked="${entry.mood == 'angry'}">
        <label class="mood-label" for="mood-angry">😤 もやもや</label>

        <input class="mood-radio" type="radio" id="mood-tired" name="mood" value="tired"
               th:checked="${entry.mood == 'tired'}">
        <label class="mood-label" for="mood-tired">😴 疲れた</label>
      </div>
    </div>

    <!-- 今日のこと -->
    <div class="field-group">
      <label class="field-label gold" for="body">今日のこと</label>
      <!--
        ★ th:field="*{body}" → entry.body にバインド
        既存の値があれば textarea に表示される（編集時の初期値）
        rows="8" → テキストエリアの初期の高さ
      -->
      <textarea id="body" th:field="*{body}" rows="8"
                placeholder="今日はどんな一日でしたか？一言でもOKです。"></textarea>
    </div>

    <!-- メモ -->
    <div class="field-group">
      <label class="field-label memo" for="memo">📝 メモ</label>
      <textarea id="memo" th:field="*{memo}" rows="4"
                placeholder="ToDo、気になった情報、あとで確認したいこと…"></textarea>
    </div>

    <!-- 気づき -->
    <div class="field-group">
      <label class="field-label insight" for="insight">💡 気づき</label>
      <textarea id="insight" th:field="*{insight}" rows="4"
                placeholder="今日気づいたこと、ハッとした瞬間、新しい視点…"></textarea>
    </div>

    <!-- 悩み -->
    <div class="field-group">
      <label class="field-label worry" for="worry">🌀 悩み</label>
      <textarea id="worry" th:field="*{worry}" rows="4"
                placeholder="誰にも言えない不安、ぐるぐるする思考、迷っていること…"></textarea>
    </div>

    <!--
      ★ th:text → ボタンのテキストも動的に変えられる
      entry.id が null（新規）なら「保存する」、あれば「更新する」
    -->
    <button class="btn-primary" type="submit"
            th:text="${entry.id == null} ? '保存する' : '更新する'">保存する</button>

  </form>

  <hr class="divider">
  <div class="section-title">最近の記録</div>

  <!--
    ★ th:each — リストをループして繰り返し表示する
    "recentEntry : ${recentEntries}" の意味:
      recentEntries → Controller から渡されたList<Entry>
      recentEntry   → ループの各要素（1件のEntry）を受け取る変数名
  -->
  <div th:each="recentEntry : ${recentEntries}">
    <!--
      ★ th:href="@{/entry/{id}(id=${recentEntry.id})}"
      URLのパラメータを動的に埋め込む書き方。
      id=${recentEntry.id} → {id} 部分に値が入る。結果: /entry/3
    -->
    <a class="entry-card" th:href="@{/entry/{id}(id=${recentEntry.id})}">
      <div class="entry-meta">
        <!--
          ★ #temporals.format でJavaのLocalDateを日本語形式に変換
        -->
        <span class="entry-date-text"
              th:text="${#temporals.format(recentEntry.date, 'yyyy年M月d日')} + '（' + ${#temporals.format(recentEntry.date, 'E', #locale)} + '）'">
          日付
        </span>
        <!--
          ★ th:text="${recentEntry.moodEmoji}" → Entityの getMoodEmoji() を呼ぶ
          Thymeleaf は getXxx() → ${xxx} として参照できる（JavaBeansの規約）
        -->
        <span th:text="${recentEntry.moodEmoji}"></span>
      </div>
      <!--
        ★ th:text="${recentEntry.body} ?: (${recentEntry.memo} ?: ''}"
        body が null なら memo を、memo も null なら空文字を表示する
      -->
      <div class="entry-preview"
           th:text="${recentEntry.body} ?: (${recentEntry.memo} ?: (${recentEntry.insight} ?: ${recentEntry.worry}))">
      </div>
    </a>
  </div>

  <!--
    ★ th:if="${#lists.isEmpty(recentEntries)}" → リストが空のとき表示
    #lists は Thymeleaf 組み込みのリスト操作ユーティリティ
  -->
  <p th:if="${#lists.isEmpty(recentEntries)}"
     style="color:var(--text-muted);font-size:14px;">
    まだ過去の記録はありません。
  </p>

</main>
</body>
</html>
