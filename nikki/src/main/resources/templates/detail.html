<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記録の詳細 — Nikki</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0A0A0A; --bg2:#111111; --card:#161616; --card2:#1C1C1C; --border:#282828;
  --gold:#C8A96E; --gold-dim:rgba(200,169,110,0.12);
  --text:#F5F0E8; --text-dim:#8A8070; --text-muted:#4A4540;
  --memo:#6E9FC8; --insight:#7EC87A; --worry:#C87A7A;
}
html { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:15px; line-height:1.6; }
body { min-height:100vh; display:flex; }
.sidebar { width:240px; flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:32px 0; position:sticky; top:0; height:100vh; }
.logo { font-family:'DM Serif Display',serif; font-size:20px; color:var(--gold); padding:0 24px 28px; border-bottom:1px solid var(--border); }
.logo small { display:block; font-size:10px; font-family:'Inter',sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--text-dim); margin-top:2px; }
.nav { padding:16px 10px; }
.nav a { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:8px; font-size:14px; color:var(--text-dim); text-decoration:none; transition:all .15s; margin-bottom:2px; }
.nav a:hover { background:var(--card); color:var(--text); }
.main { flex:1; padding:48px; max-width:800px; }
.date-eyebrow { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
.page-title { font-family:'DM Serif Display',serif; font-size:40px; line-height:1.1; margin-bottom:4px; }
.page-title em { font-style:italic; color:var(--gold); }
.mood-row { font-size:14px; color:var(--text-dim); margin-bottom:32px; }
.section { margin-bottom:24px; }
.section-label { font-size:10px; letter-spacing:.18em; text-transform:uppercase; font-weight:600; margin-bottom:10px; }
.lbl-diary   { color:var(--gold); }
.lbl-memo    { color:var(--memo); }
.lbl-insight { color:var(--insight); }
.lbl-worry   { color:var(--worry); }
.section-body { font-size:15px; color:var(--text-dim); line-height:1.9; white-space:pre-wrap; background:var(--card); border-radius:10px; padding:16px 20px; }
hr.divider { border:none; border-top:1px solid var(--border); margin:24px 0; }
.action-row { display:flex; gap:10px; margin-top:32px; }
.btn-primary { background:var(--gold); color:var(--bg); border:none; border-radius:8px; padding:11px 26px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-block; }
.btn-secondary { background:transparent; border:1px solid var(--border); color:var(--text-dim); border-radius:8px; padding:10px 20px; font-family:'Inter',sans-serif; font-size:14px; cursor:pointer; text-decoration:none; display:inline-block; transition:all .15s; }
.btn-secondary:hover { border-color:var(--gold); color:var(--gold); }
.btn-danger { background:transparent; border:1px solid var(--border); color:var(--text-muted); border-radius:8px; padding:10px 20px; font-family:'Inter',sans-serif; font-size:14px; cursor:pointer; transition:all .15s; }
.btn-danger:hover { border-color:var(--worry); color:var(--worry); }
@media (max-width:640px) { .sidebar { display:none; } .main { padding:24px 16px 60px; } }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">Nikki<small>Your Journal</small></div>
  <nav class="nav">
    <a th:href="@{/today}">✦ 今日</a>
    <a th:href="@{/history}">◈ 過去の記録</a>
    <a th:href="@{/reflect}">◎ 振り返り</a>
  </nav>
</aside>

<main class="main">

  <div class="date-eyebrow" th:text="${#temporals.format(entry.date, 'yyyy年M月d日')}"></div>
  <div class="page-title">
    <em th:text="${#temporals.format(entry.date, 'M月d日')}">日付</em>の記録
  </div>
  <div class="mood-row" th:if="${entry.mood != null}"
       th:text="${entry.moodEmoji} + ' ' + ${entry.moodLabel}">
  </div>

  <!-- 日記 -->
  <div class="section" th:if="${entry.body != null and !#strings.isEmpty(entry.body)}">
    <div class="section-label lbl-diary">日記</div>
    <div class="section-body" th:text="${entry.body}"></div>
  </div>

  <hr class="divider" th:if="${entry.memo != null and !#strings.isEmpty(entry.memo)}">

  <!-- メモ -->
  <div class="section" th:if="${entry.memo != null and !#strings.isEmpty(entry.memo)}">
    <div class="section-label lbl-memo">📝 メモ</div>
    <div class="section-body" th:text="${entry.memo}"></div>
  </div>

  <hr class="divider" th:if="${entry.insight != null and !#strings.isEmpty(entry.insight)}">

  <!-- 気づき -->
  <div class="section" th:if="${entry.insight != null and !#strings.isEmpty(entry.insight)}">
    <div class="section-label lbl-insight">💡 気づき</div>
    <div class="section-body" th:text="${entry.insight}"></div>
  </div>

  <hr class="divider" th:if="${entry.worry != null and !#strings.isEmpty(entry.worry)}">

  <!-- 悩み -->
  <div class="section" th:if="${entry.worry != null and !#strings.isEmpty(entry.worry)}">
    <div class="section-label lbl-worry">🌀 悩み</div>
    <div class="section-body" th:text="${entry.worry}"></div>
  </div>

  <!-- アクション -->
  <div class="action-row">
    <a class="btn-primary" th:href="@{/entry/{id}/edit(id=${entry.id})}">✏️ 編集する</a>
    <a class="btn-secondary" th:href="@{/history}">← 一覧に戻る</a>
    <form th:action="@{/entry/{id}/delete(id=${entry.id})}" method="post" style="display:inline;"
          onsubmit="return confirm('この記録を削除しますか？')">
      <button class="btn-danger" type="submit">🗑 削除</button>
    </form>
  </div>

</main>
</body>
</html>
